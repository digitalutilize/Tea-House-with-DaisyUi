<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea House with DaisyUi</title>

    <!-- DaisyUi & Tailwind CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- font-awesome -->
    <script src="https://kit.fontawesome.com/2e0efbf4c2.js" crossorigin="anonymous"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <!-- DaisyUi custom color -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clifford: '#da373d',
                    }
                }
            }
        }
    </script>

    <style>
        .font-manrope {
            font-family: "Manrope", sans-serif;
        }
    </style>
</head>

<body class="font-manrope ">

    <header>
        <div class="header-container w-11/12 lg:w-3/4 mx-auto">
            <div class="hero ">
                <div class="hero-content flex-col lg:flex-row text-center lg:text-start">

                    <div class="flex-1">
                        <h1 class="text-[#1C1C1C] text-3xl sm:text-4xl lg:text-5xl xl:text-6xl 2xl:text-7xl font-extrabold">
                            It's good <br>
                            tea time at The <br>
                            Tea House
                        </h1>
                        <p class="py-8 text-[#777777] text-lg font-medium w-11/12 md:w-10/12 lg:w-8/12 mx-auto lg:ml-0"> Tea and Botanical Solutions Supplier Give Optimum Satisfaction To Your Taste Buds.</p>
                        <button class="btn btn-primary bg-gradient-to-r from-[#FF8938] to-[#FF0000] text-white text-lg border-none">
                            Explore More
                            <i class="fa-solid fa-arrow-right-long -rotate-45"></i>
                        </button>
                    </div>

                    <div class="flex-1">
                        
                            <img src="images/banner.png" class="w-fit" />
                            
                        <div class="flex items-center gap-3 drop-shadow-lg px-5 py-4 bg-white rounded-xl w-fit -mt-24 ml-14">
                            <i class="fa-solid fa-star text-[#FFDC64] text-3xl lg:text-5xl"></i>
                            <div>
                                <h1 class="text-xl sm:text-2xl md:text-3xl font-extrabold">5.00</h1>
                                <p class="text-[#777777] text-base md:text-lg font-semibold">Trust Pilot Ratings</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>


</body>

</html>
